name: Build and Release Android

on:
  workflow_run:
    workflows: ["docker-release.yml"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-android]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
      
      - name: Get tag version
        id: tag
        run: |
          # Get tag from workflow run head branch (e.g., v1.0.0)
          TAG=${{ github.event.workflow_run.head_branch }}
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.VERSION }}
          name: LaChispa ${{ steps.tag.outputs.VERSION }}
          body: |
            ## LaChispa ${{ steps.tag.outputs.VERSION }}
            
            ### Descarga disponible:
            - **Android**: `app-release.apk`
            - **Docker**: `ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.VERSION }}`
            
            ### Instalación:
            - Descargar APK e instalar en Android
            
            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.VERSION }}
            docker run -p 7777:80 ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.VERSION }}
            ```
            
          files: |
            app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}